<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* background blur */

.bg{

position:fixed;
width:100%;
height:100%;
background:url("cover.jpg");
background-size:cover;
background-position:center;
filter:blur(40px) brightness(0.3);
z-index:-1;

}

.player{

width:360px;
background:#181818;
padding:30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
text-align:center;

}

/* album */

.cover{

width:100%;
border-radius:12px;
margin-bottom:20px;
animation:spin 8s linear infinite;
animation-play-state:paused;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

.title{

font-size:20px;
font-weight:bold;

}

.artist{

color:#b3b3b3;
font-size:14px;
margin-bottom:15px;

}

/* progress */

.progress{

width:100%;
cursor:pointer;

}

.time{

display:flex;
justify-content:space-between;
font-size:12px;
color:#aaa;

}

/* controls */

.controls{

display:flex;
align-items:center;
justify-content:center;
gap:18px;
margin-top:15px;

}

button{

background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;

}

.play{

background:#1DB954;
width:55px;
height:55px;
border-radius:50%;
font-size:24px;

}

.volume{

width:80px;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="player">

<img src="cover.jpg" class="cover" id="cover">

<div class="title">My Song</div>
<div class="artist">Unknown Artist</div>

<audio id="audio" src="song.mp3" autoplay></audio>

<input type="range" id="progress" class="progress" value="0">

<div class="time">

<span id="current">0:00</span>
<span id="duration">0:00</span>

</div>

<div class="controls">

<button onclick="restart()">⏮</button>

<button class="play" onclick="toggle()">▶</button>

<button onclick="skip()">⏭</button>

🔊

<input type="range" id="volume" class="volume" min="0" max="1" step="0.01" value="1">

</div>

</div>

<script>

let audio=document.getElementById("audio")
let progress=document.getElementById("progress")
let volume=document.getElementById("volume")
let cover=document.getElementById("cover")

let current=document.getElementById("current")
let duration=document.getElementById("duration")

/* autoplay */

window.addEventListener("load",()=>{

audio.play().catch(()=>{})

})

/* play pause */

function toggle(){

if(audio.paused){

audio.play()
cover.style.animationPlayState="running"

}else{

audio.pause()
cover.style.animationPlayState="paused"

}

}

/* restart */

function restart(){

audio.currentTime=0

}

/* skip */

function skip(){

audio.currentTime=audio.duration

}

/* load duration */

audio.addEventListener("loadedmetadata",()=>{

progress.max=audio.duration

let m=Math.floor(audio.duration/60)
let s=Math.floor(audio.duration%60)

if(s<10)s="0"+s

duration.textContent=m+":"+s

})

/* update time */

audio.addEventListener("timeupdate",()=>{

progress.value=audio.currentTime

let m=Math.floor(audio.currentTime/60)
let s=Math.floor(audio.currentTime%60)

if(s<10)s="0"+s

current.textContent=m+":"+s

})

/* seek */

progress.addEventListener("input",()=>{

audio.currentTime=progress.value

})

/* volume */

volume.addEventListener("input",()=>{

audio.volume=volume.value

})

/* spin when playing */

audio.addEventListener("play",()=>{

cover.style.animationPlayState="running"

})

audio.addEventListener("pause",()=>{

cover.style.animationPlayState="paused"

})

</script>

</body>

</html>
